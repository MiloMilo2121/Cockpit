name: life-cockpit

x-cockpit-common-env: &cockpit-common-env
  APP_ENV: ${APP_ENV}
  TZ: ${TZ}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL}
  OPENROUTER_FREE_MODELS: ${OPENROUTER_FREE_MODELS}
  OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS}
  OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE}
  OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS}
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL}
  PRIVACY_NODE_URL: http://privacy-node:8100
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY}
  RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME}
  RAG_VECTOR_SIZE: ${RAG_VECTOR_SIZE}
  RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS}
  RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS}
  RAG_SEMANTIC_SIMILARITY_THRESHOLD: ${RAG_SEMANTIC_SIMILARITY_THRESHOLD}
  RAG_DEFAULT_TOP_K: ${RAG_DEFAULT_TOP_K}
  RAG_DENSE_WEIGHT: ${RAG_DENSE_WEIGHT}
  RAG_SPARSE_WEIGHT: ${RAG_SPARSE_WEIGHT}
  RAG_AGENTIC_CHUNK_MAX_CHARS: ${RAG_AGENTIC_CHUNK_MAX_CHARS}
  RAG_QUERY_CANDIDATES: ${RAG_QUERY_CANDIDATES}
  RAG_RERANK_CANDIDATES: ${RAG_RERANK_CANDIDATES}
  COCKPIT_WORKER_CONCURRENCY: ${COCKPIT_WORKER_CONCURRENCY}
  SMART_BUFFERING_ENABLED: ${SMART_BUFFERING_ENABLED}
  SMART_BUFFER_SECONDS: ${SMART_BUFFER_SECONDS}
  SMART_BUFFER_TTL_SECONDS: ${SMART_BUFFER_TTL_SECONDS}
  LOOP_BLOCK_FROM_ME: ${LOOP_BLOCK_FROM_ME}
  ALLOW_LOCAL_DEGRADED_MODE: ${ALLOW_LOCAL_DEGRADED_MODE}
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${CIRCUIT_BREAKER_FAILURE_THRESHOLD}
  CIRCUIT_BREAKER_OPEN_SECONDS: ${CIRCUIT_BREAKER_OPEN_SECONDS}
  DEAD_LETTER_ENABLED: ${DEAD_LETTER_ENABLED}

services:
  postgres:
    image: postgres:16-alpine
    container_name: lc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: lc-redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes --save 60 1 --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lc-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend

  cockpit-api:
    build:
      context: ./services/cockpit-core
    container_name: lc-cockpit-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      privacy-node:
        condition: service_healthy
    environment:
      <<: *cockpit-common-env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  cockpit-worker:
    build:
      context: ./services/cockpit-core
    container_name: lc-cockpit-worker
    restart: unless-stopped
    command: celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${COCKPIT_WORKER_CONCURRENCY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      privacy-node:
        condition: service_healthy
    environment:
      <<: *cockpit-common-env
    networks:
      - backend

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: lc-evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: https://${DOMAIN_EVOLUTION}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      LOG_LEVEL: ERROR

      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      DATABASE_SAVE_DATA_LABELS: true
      DATABASE_SAVE_DATA_HISTORIC: true

      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/2
      CACHE_REDIS_PREFIX_KEY: evolution

      WEBSOCKET_ENABLED: true
      CONFIG_SESSION_PHONE_CLIENT: LifeCockpit
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: lc-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 10m
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend

  privacy-node:
    build:
      context: ./services/privacy-node
    container_name: lc-privacy-node
    restart: unless-stopped
    environment:
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      PRIVACY_SALT: ${PRIVACY_SALT}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8100/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  caddy:
    image: caddy:2.9-alpine
    container_name: lc-caddy
    restart: unless-stopped
    depends_on:
      cockpit-api:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      DOMAIN_API: ${DOMAIN_API}
      DOMAIN_EVOLUTION: ${DOMAIN_EVOLUTION}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - backend

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  evolution_instances:
  ollama_data:
  caddy_data:
  caddy_config:
